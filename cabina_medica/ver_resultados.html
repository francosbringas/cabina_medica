<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados del Paciente</title>
  <style>
    body { background:#001F3F; color:white; font-family:sans-serif; padding:20px; text-align:center; }
    table { margin:0 auto; border-collapse:collapse; width:80%; }
    th, td { border:1px solid #fff; padding:10px; }
    th { background:#0074D9; }
  </style>
</head>
<body>
  <h2>Último Chequeo</h2>
  <table>
    <thead>
      <tr><th>Fecha</th><th>Temperatura (°C)</th><th>Oximetría (%)</th><th>Pulso (BPM)</th></tr>
    </thead>
    <tbody id="datos">
      <tr><td colspan="4">Cargando...</td></tr>
    </tbody>
  </table>

  <script>
    const params = new URLSearchParams(location.search);
    const dni = params.get('dni_paciente') || '';

    async function cargar() {
      const res = await fetch(`verificar_diagnostico.php?dni=${encodeURIComponent(dni)}`);
      const json = await res.json();
      const tbody = document.getElementById('datos');
      if (json.success) {
        const r = json.resultado;
        tbody.innerHTML = `
          <tr>
            <td>${r.fecha}</td>
            <td>${r.temperatura}</td>
            <td>${r.oximetria}</td>
            <td>${r.pulso}</td>
          </tr>`;
      } else {
        tbody.innerHTML = `<tr><td colspan="4">Sin resultados</td></tr>`;
      }
    }

    cargar();
    setInterval(cargar, 5000);
  </script>
</body>
</html>
