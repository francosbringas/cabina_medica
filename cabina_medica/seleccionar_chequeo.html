<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Seleccionar Chequeo</title>
  <style>
    body { background-color: #001F3F; color: white; font-family: sans-serif; text-align: center; padding-top: 80px; }
    h1 { margin-bottom: 40px; }
    .boton {
      display: block; width: 250px; margin: 20px auto;
      padding: 15px; font-size: 18px; background-color: #0074D9;
      color: white; border: none; border-radius: 10px; cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .boton:hover { background-color: #005fa3; }
    .navegacion {
      position: fixed; bottom: 20px; width: 100%;
      display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
    }
    .navegacion button {
      padding: 10px 20px; font-size: 16px;
      border: none; border-radius: 8px; cursor: pointer;
    }
    .volver { background-color: #FF851B; color: black; }
    .menu { background-color: #7FDBFF; color: black; }
  </style>
</head>
<body>
  <h1>¡Bienvenido usuario!</h1><h1>Acabas de ingresar a la cabina médica.</h1><h1>Comencemos con unos chequeos para revisar su salud.</h1><h1>Luego de terminar con sus chequeos, puede decidir si realizar una llamada con un médico o cerrar sesión.</h1>
  <button class="boton" onclick="window.location.href='temperatura.html'">Comenzar chequeos</button>
</body>
</html>
