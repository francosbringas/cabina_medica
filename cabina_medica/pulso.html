<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Medir Pulso</title>
  <style>
    body { background-color: #001F3F; color: white; font-family: sans-serif; text-align: center; padding-top: 80px; }
    .dots span {
      animation: blink 1.4s infinite both;
      font-size: 30px;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
    .navegacion {
      position: fixed; bottom: 20px; width: 100%;
      display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
    }
    .navegacion button {
      padding: 10px 20px; font-size: 16px;
      border: none; border-radius: 8px; cursor: pointer;
    }
    .volver { background-color: #FF851B; color: black; }
    .menu { background-color: #7FDBFF; color: black; }
  </style>
</head>
<body>

  <h1 id="mensajeInicial">Acerquese al sensor para medir su pulso</h1>
  <h1 id="mensajeMidiendo">Midiendo pulso</h1>
  <div class="dots">
    <span>.</span><span>.</span><span>.</span>
  </div>

  <script>
    const mensajeInicialElement = document.getElementById('mensajeInicial');
    const mensajeMidiendoElement = document.getElementById('mensajeMidiendo');
    const dotsElement = document.querySelector('.dots');
    // Ocultar el segundo mensaje y los puntos inicialmente
    mensajeMidiendoElement.style.display = 'none';
    dotsElement.style.display = 'none';

    // esperar 5 segundos y luego mostrar el segundo mensaje y los puntos
    setTimeout(() => {
      mensajeInicialElement.style.display = 'none';
      mensajeMidiendoElement.style.display = 'block';
      dotsElement.style.display = 'block';

      // esperar otros 5 segundos y luego redirigir
      setTimeout(() => {
        window.location.href = 'ver_resultados.html'; 
      }, 5000);

    }, 5000);
  </script>
<body>
</html>
