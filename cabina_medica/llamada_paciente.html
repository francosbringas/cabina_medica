<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Videollamada – Paciente</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }
    #container {
      display: flex;
      height: 100%;
    }
    #video {
      flex: 1;
      position: relative;
    }
    #video iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    #controls {
      width: 200px;
      background: #001F3F;
      color: white;
      padding: 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #controls h2 {
      font-size: 18px;
      margin-bottom: 20px;
      text-align: center;
    }
    .boton {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background: #FF4136;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="video">
      <iframe
        id="video-call"
        src="https://whereby.com/llamada-medica?embed"
        allow="camera; microphone; fullscreen; speaker; display-capture">
      </iframe>
    </div>
    <div id="controls">
      <h2>Videollamada</h2>
      <button class="boton" id="cerrar-sesion">Cerrar sesión</button>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem('login_exitoso') === '1') {
      alert('Inicio de sesión correcta');
      sessionStorage.removeItem('login_exitoso');
    }


    document.getElementById('cerrar-sesion').addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = 'login_paciente.html';
    });
  </script>
</body>
</html>
