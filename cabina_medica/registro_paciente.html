<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Registro Paciente</title>
  <style>
    html, body { margin:0; padding:0; width:100vw; height:100vh; overflow:hidden; }
    body {
      background:#0b0f16;
      color: white;
      font-family: Arial, sans-serif;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
    }
    #display {
      width:300px;
      height:50px;
      background:black;
      color: limegreen;
      font-size:2em;
      text-align:center;
      padding:10px;
      border-radius:5px;
      margin-bottom:20px;
      letter-spacing:5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .teclado {
      margin-bottom: 20px;
    }
    #teclado-num {
      display:grid;
      grid-template-columns:repeat(3, 100px);
      grid-gap:10px;
    }
    #teclado-let {
      display:none;
      margin-top:10px;
      text-align:center;
    }
    .fila-letras {
      margin-bottom: 10px;
    }
    .tecla-letra {
      display: inline-block;
      margin: 5px;
      padding: 15px 20px;
      background-color: #123;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 20px;
      cursor: pointer;
      user-select: none;
      min-width: 40px;
      text-align:center;
    }
    .tecla-letra:hover {
      background-color: #345;
    }

    .botones {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
      border: none;
      padding: 15px 30px;
      user-select: none;
    }
    #borrar {
      background: darkred;
      color: white;
    }
    #volver {
      background: #555;
      color: white;
    }
    #continuar {
      background: green;
      color: white;
    }
    .link-back {
      margin-top: 20px;
      color: lightblue;
      text-decoration: underline;
      cursor: pointer;
    }
    #modal {
      position:fixed; top:0; left:0; width:100vw; height:100vh;
      background:rgba(0,0,0,0.75);
      display:none;
      align-items:center; justify-content:center;
      z-index: 1000;
    }
    #modal .caja {
      background:white; color:black; padding:20px; border-radius:8px; text-align:center;
      max-width: 90vw;
      word-wrap: break-word;
    }
    #modal .caja button {
      margin-top:15px; padding:10px 20px; border:none;
      background:#0074D9; color:white; border-radius:5px; cursor:pointer;
    }
  </style>
</head>
<body>

<script>document.documentElement.requestFullscreen?.().catch(()=>{});</script>

<h1>Registro de Paciente</h1>
<div id="display">Ingrese DNI</div>

<div class="teclado" id="teclado-num"></div>
<div class="teclado" id="teclado-let"></div>

<div class="botones">
  <button id="borrar" type="button">Borrar</button>
  <button id="volver" type="button">Volver</button>
  <button id="continuar" type="button">Continuar</button>
</div>

<div class="link-back" onclick="location.href='login_paciente.html'">
  Volver a login
</div>

<div id="modal">
  <div class="caja">
    <div id="modal-msg"></div>
    <button id="modal-ok">OK</button>
  </div>
</div>

<script>
  function showModal(msg) {
    document.getElementById('modal-msg').textContent = msg;
    document.getElementById('modal').style.display = 'flex';
  }
  document.getElementById('modal-ok').onclick = () => {
    document.getElementById('modal').style.display = 'none';
  };

  let etapa = 'dni', input = '', dni = '', pin = '', nombre = '', apellido = '';
  const disp = document.getElementById('display');
  const num = document.getElementById('teclado-num');
  const letb = document.getElementById('teclado-let');
  const cont = document.getElementById('continuar');
  const bor = document.getElementById('borrar');
  const vol = document.getElementById('volver');

  function actualizarDisplay() {
    if (input.length === 0) {
      disp.textContent = {
        dni: 'Ingrese DNI',
        pin: 'Ingrese PIN',
        nombre: 'Ingrese Nombre',
        apellido: 'Ingrese Apellido'
      }[etapa];
    } else {
      disp.textContent = input;
    }
  }

  const filas = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
  filas.forEach(filaTexto => {
    const fila = document.createElement('div');
    fila.className = 'fila-letras';
    for (const letra of filaTexto) {
      const boton = document.createElement('button');
      boton.textContent = letra;
      boton.className = 'tecla-letra';
      boton.type = 'button';
      boton.onclick = () => {
        if (input.length < 35) { // límite de caracteres para nombre/apellido
          input += letra;
          actualizarDisplay();
        }
      };
      fila.appendChild(boton);
    }
    letb.appendChild(fila);
  });

  function buildPad() {
    num.innerHTML = '';
    for (let i = 1; i <= 9; i++) {
      const b = document.createElement('button');
      b.textContent = i;
      b.className = 'tecla';
      b.type = 'button';
      b.onclick = () => {
        let maxLen = (etapa === 'dni') ? 8 : (etapa === 'pin' ? 4 : 35);
        if (input.length < maxLen) {
          input += i;
          actualizarDisplay();
        }
      };
      num.appendChild(b);
    }
    const empty = document.createElement('div');
    empty.style.gridColumn = 'span 3';
    num.appendChild(empty);

    const b0 = document.createElement('button');
    b0.textContent = '0';
    b0.className = 'tecla';
    b0.type = 'button';
    b0.onclick = () => {
      let maxLen = (etapa === 'dni') ? 8 : (etapa === 'pin' ? 4 : 35);
      if (input.length < maxLen) {
        input += '0';
        actualizarDisplay();
      }
    };
    num.appendChild(b0);

    const empty2 = document.createElement('div');
    empty2.style.gridColumn = 'span 3';
    num.appendChild(empty2);
  }
  buildPad();

  function actualizarTeclado() {
    if (etapa === 'dni' || etapa === 'pin') {
      num.style.display = 'grid';
      letb.style.display = 'none';
    } else if (etapa === 'nombre' || etapa === 'apellido') {
      num.style.display = 'none';
      letb.style.display = 'block';
    }
  }

  bor.onclick = () => {
    if (input.length > 0) {
      input = input.slice(0, -1);
      actualizarDisplay();
    }
  };

  vol.onclick = () => {
    input = '';
    if (etapa === 'apellido') etapa = 'nombre';
    else if (etapa === 'nombre') etapa = 'pin';
    else if (etapa === 'pin') etapa = 'dni';
    actualizarDisplay();
    actualizarTeclado();
  };

  cont.onclick = () => {
    if (etapa === 'dni') {
      if (input.length !== 8) {
        showModal('Ingrese un DNI válido (8 dígitos)');
        return;
      }
      fetch(`verificar_dni_paciente.php?dni=${input}`)
        .then(r => r.json())
        .then(d => {
          if (d.exists) {
            showModal('Ese DNI ya está en uso');
            input = '';
            actualizarDisplay();
          } else {
            dni = input;
            input = '';
            etapa = 'pin';
            actualizarDisplay();
            actualizarTeclado();
          }
        })
        .catch(() => {
          dni = input;
          input = '';
          etapa = 'pin';
          actualizarDisplay();
          actualizarTeclado();
        });
    }
    else if (etapa === 'pin') {
      if (input.length !== 4) {
        showModal('El PIN debe tener 4 dígitos');
        return;
      }
      pin = input;
      input = '';
      etapa = 'nombre';
      actualizarDisplay();
      actualizarTeclado();
    }
    else if (etapa === 'nombre') {
      if (input.length < 2 || input.length > 35) {
        showModal('El nombre debe tener entre 2 y 35 caracteres');
        return;
      }
      nombre = input;
      input = '';
      etapa = 'apellido';
      actualizarDisplay();
      actualizarTeclado();
    }
    else if (etapa === 'apellido') {
      if (input.length < 2 || input.length > 35) {
        showModal('El apellido debe tener entre 2 y 35 caracteres');
        return;
      }
      apellido = input;

      fetch('registro_paciente.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `dni=${encodeURIComponent(dni)}&pin=${encodeURIComponent(pin)}&nombre=${encodeURIComponent(nombre)}&apellido=${encodeURIComponent(apellido)}`
      })
      .then(r => r.json())
      .then(d => {
        showModal(d.message);
        if (d.success) location.href = 'login_paciente.html';
      })
      .catch(() => showModal('Error al registrar paciente. Intente nuevamente más tarde.'));
    }
  };

  actualizarTeclado();
  actualizarDisplay();
</script>

</body>
</html>
