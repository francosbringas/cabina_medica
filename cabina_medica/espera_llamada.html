<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Pantalla de Espera</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0b0f16, hsl(220, 2%, 28%));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      user-select: none;
    }
    .loader {
      display: flex;
      gap: 15px;
    }
    .dot {
      width: 25px;
      height: 25px;
      background-color: #2ECC40;
      border-radius: 100%;
      animation: bounce 1.5s infinite ease-in-out;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    .message {
      position: absolute;
      top: 30%;
      width: 100%;
      text-align: center;
      font-size: 2.5rem;
      letter-spacing: 0.1em;
      text-shadow: 0 0 8px rgba(0,0,0,0.7);
    }
  </style>
</head>
<body>
  <div class="message" id="statusMessage">
    Se notificó al médico para iniciar la llamada. Por favor, espere a que atienda...
  </div>
  <div class="loader" aria-label="Cargando animación">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script>
    async function checkCallStatus() {
      try {
        const res = await fetch('estado_llamada.php', { cache: "no-store" });
        if (!res.ok) throw new Error('Error en la respuesta del servidor');
        const data = await res.json();
        console.log('Estado de llamada (paciente):', data.estado);

        if (data.estado === 2 && data.dni_paciente) {
          // Obtener nombre y apellido del paciente
          const resp = await fetch(`get_paciente.php?dni=${encodeURIComponent(data.dni_paciente)}`);
          const paciente = await resp.json();
          let nombre = 'Paciente';
          if (paciente.success) {
            nombre = `${paciente.nombre} ${paciente.apellido}`;
          }
          window.location.href = `https://whereby.com/llamada-medica?embed&userName=${encodeURIComponent(nombre)}`;
        } else if (data.estado === 0) {
          document.getElementById('statusMessage').textContent = 'No hay médicos disponibles. Redirigiendo...';
          setTimeout(() => {
            window.location.href = 'login_paciente.html';
          }, 3000);
        }
      } catch (err) {
        console.error('Error al consultar estado de llamada:', err);
        document.getElementById('statusMessage').textContent = 'Error de conexión. Reintentando...';
      }
    }
    setInterval(checkCallStatus, 2000);
    checkCallStatus();
  </script>
</body>
</html>
