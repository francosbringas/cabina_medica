<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cabina Médica – Panel Médico</title>
  <style>
    body {
      background: #1b2127;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }
    a.volver {
      color: #7FDBFF;
      text-decoration: underline;
      display: block;
      margin-bottom: 20px;
    }
    .boton {
      width: 200px;
      padding: 15px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #2ECC40;
      cursor: pointer;
      font-size: 1em;
    }
    .boton:hover {
      background: #28b232;
    }
    #notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 15px 25px;
      border-radius: 5px;
      display: none;
    }
    iframe {
      width: 100%;
      height: 300px;
      border: none;
      margin-top: 20px;
    }
    .popup-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .popup-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      color: black;
    }
    .popup-content button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .popup-content .accept-btn { background: #2ECC40; color: white; }
    .popup-content .reject-btn { background: #FF4136; color: white; }
    #end-call-btn {
      display: none;
      margin: 20px auto;
      background: #FF4136;
      color: white;
      font-size: 1.1em;
      padding: 15px 35px;
      border-radius: 10px;
    }
    #end-call-btn:hover {
      background: #c82333;
    }
    #diagnostico-container {
      margin: 30px auto;
      max-width: 400px;
      background: #012C54;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px #0003;
    }
    #diagnostico-container h2 {
      margin-bottom: 18px;
    }
    #ultimo-diagnostico {
      margin-bottom: 16px;
      font-size: 1.1em;
    }
    #nuevo-diagnostico-form label {
      font-size: 1em;
      margin-bottom: 6px;
      display: block;
    }
    #nuevo-diagnostico-form input[type="number"] {
      width: 120px;
      padding: 6px;
      border-radius: 5px;
      border: none;
      margin: 8px 0;
      font-size: 1em;
      text-align: center;
    }
    #nuevo-diagnostico-form button {
      background: #0074D9;
      color: white;
      border: none;
      border-radius: 7px;
      padding: 8px 24px;
      font-size: 1em;
      margin-top: 10px;
      cursor: pointer;
    }
    #nuevo-diagnostico-form button:hover {
      background: #005fa3;
    }
    #diagnostico-msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="notification"></div>
  <a href="login_medico.html" class="volver">← Cerrar sesión</a>
  <h1>Cabina Médica – Panel Médico</h1>

  <button class="boton" onclick="activartermometro()">Termómetro</button>
  <button class="boton" onclick="activarmedicamento(24, 'Sertal dispensado')">Sertal</button>
  <button class="boton" onclick="activarmedicamento(23, 'Paracetamol dispensado')">Paracetamol</button>
  <button class="boton" onclick="activarmedicamento(22, 'Ibuprofeno dispensado')">Ibuprofeno</button><br><br>

  <iframe id="ifr-resultados"
    src=""
    title="Resultados del Paciente"
    style="display:none;">
  </iframe>

  <div id="call-notification-popup" class="popup-overlay" style="display:none;">
    <div class="popup-content">
      <h2>Un paciente quiere comunicarse con usted.</h2>
      <button class="accept-btn" onclick="handleCall(1)">Aceptar</button>
      <button class="reject-btn" onclick="handleCall(0)">Rechazar</button>
    </div>
  </div>

  <button id="end-call-btn" class="boton">Finalizar videollamada</button>

  <div id="diagnostico-container" style="display:none;">
    <h2>Diagnóstico del Paciente</h2>
    <div id="ultimo-diagnostico">Cargando último diagnóstico...</div>
    <form id="nuevo-diagnostico-form" style="margin-top: 15px;">
      <label for="temperatura">Nueva temperatura (°C):</label>
      <input type="number" step="0.1" name="temperatura" id="temperatura" required>
      <button type="submit">Registrar</button>
    </form>
    <div id="diagnostico-msg"></div>
  </div>

  <script>
  let llamadaActiva = false;
  let dniPaciente = null;
  let videollamadaWindow = null;

  // mostrar notificacion
  function showNotification(msg, isError = false) {
    const notif = document.getElementById('notification');
    notif.textContent = msg;
    notif.style.background = isError ? '#FF4136' : 'rgba(0,0,0,0.8)';
    notif.style.display = 'block';
    setTimeout(() => { notif.style.display = 'none'; }, 2500);
  }

  // llama al PHP que ejecuta el BAT para gpio (medicamentos/termometro)
  function activarmedicamento(gpio, mensaje) {
    fetch('ipower_control.php', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'port=1&action=on'
    })
    .then(() =>{
      setTimeout(()=>{
        fetch('ipower_control.php', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: 'port=1&action=off'
        });
      }, 2000);
    });
    fetch('activar_medicamento.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'gpio=' + gpio
    })
    .then(resp => resp.text())
    .then(txt => {
      if (txt.trim() === 'OK') {
        showNotification(mensaje);
      } else {
        showNotification('Error al activar dispositivo: ' + txt, true);
      }
    })
    .catch(err => {
      showNotification('Error en la comunicación: ' + err, true);
    });
  }

  function activartermometro(){
    fetch('ipower_control.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'port=3&action=on'
    }).then(()=>{
      showNotification("Capsula de termómetro abierta");
      setTimeout(()=>{
        fetch('ipower_control.php',{
          method:'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: 'port=3&action=off'
        });
      }, 5000);
    });
  }
  // polling para revisar si hay llamada pendiente
  async function checkCallStatus() {
    try {
      const res = await fetch('estado_llamada.php', { cache: 'no-store' });
      const data = await res.json();
      if (data.estado === 1 && data.dni_paciente && !llamadaActiva) {
        llamadaActiva = true;
        dniPaciente = data.dni_paciente;
        // Carga nombre/apellido
        const rp = await fetch(`get_paciente.php?dni=${encodeURIComponent(dniPaciente)}`);
        const pd = await rp.json();
        if (pd.success) {
          document.querySelector('.popup-content h2').textContent =
            `El paciente ${pd.nombre} ${pd.apellido} quiere comunicarse con usted.`;
        } else {
          document.querySelector('.popup-content h2').textContent =
            "Un paciente quiere comunicarse con usted.";
        }
        document.getElementById('call-notification-popup').style.display = 'flex';
      } else if ((data.estado === 0 || data.estado === null) && llamadaActiva) {
        // Si la llamada se finaliza, ocultar todo y limpiar
        llamadaActiva = false;
        dniPaciente = null;
        document.getElementById('call-notification-popup').style.display = 'none';
        document.getElementById('ifr-resultados').style.display = 'none';
        document.getElementById('end-call-btn').style.display = 'none';
        document.getElementById('diagnostico-container').style.display = 'none';
        if (videollamadaWindow && !videollamadaWindow.closed) {
          videollamadaWindow.close();
        }
      }
    } catch (err) {
      console.error(err);
    }
  }

  // aceptar o rechazar llamada
  async function handleCall(status) {
    document.getElementById('call-notification-popup').style.display = 'none';

    if (status === 1 && dniPaciente) {
      const iframe = document.getElementById('ifr-resultados');
      iframe.src = `ver_resultados.html?dni_paciente=${encodeURIComponent(dniPaciente)}`;
      iframe.style.display = 'block';
      document.getElementById('diagnostico-container').style.display = 'block';
      cargarUltimoDiagnostico();
    } else {
      document.getElementById('ifr-resultados').style.display = 'none';
      document.getElementById('diagnostico-container').style.display = 'none';
    }

    try {
      // si acepta, enviar estado 2; si rechaza, estado 0
      const estadoEnviar = (status === 1) ? 2 : 0;
      await fetch('set_estado_llamada.php', {
        method:'POST',
        headers:{ 'Content-Type':'application/x-www-form-urlencoded' },
        body:`dni=${dniPaciente}&estado=${estadoEnviar}`
      });
      if (status === 1) {
        // abre la videollamada en nueva ventana/pestaña
        videollamadaWindow = window.open(
          `https://whereby.com/llamada-medica?embed`,
          '_blank'
        );
        document.getElementById('end-call-btn').style.display = 'inline-block';
      } else {
        llamadaActiva = false;
        dniPaciente = null;
        document.getElementById('end-call-btn').style.display = 'none';
        document.getElementById('diagnostico-container').style.display = 'none';
        if (videollamadaWindow && !videollamadaWindow.closed) {
          videollamadaWindow.close();
        }
      }
    } catch (err) {
      alert('Error al procesar la llamada: '+err.message);
    }
  }

  // boton para finalizar la videollamada (medico)
  document.getElementById('end-call-btn').onclick = async function() {
    await fetch('set_estado_llamada.php', {
      method:'POST',
      headers:{ 'Content-Type':'application/x-www-form-urlencoded' },
      body:`estado=0`
    });
    if (videollamadaWindow && !videollamadaWindow.closed) {
      videollamadaWindow.close();
    }
    this.style.display = 'none';
    llamadaActiva = false;
    dniPaciente = null;
    document.getElementById('ifr-resultados').style.display = 'none';
    document.getElementById('diagnostico-container').style.display = 'none';
  };

  setInterval(checkCallStatus, 2000);
  checkCallStatus();

  // diagnostico ver y cargar temperatura
  async function cargarUltimoDiagnostico() {
    if (!dniPaciente) return;
    document.getElementById('ultimo-diagnostico').textContent = "Cargando último diagnóstico...";
    const resp = await fetch(`get_ultimo_diagnostico.php?dni=${encodeURIComponent(dniPaciente)}`);
    const data = await resp.json();
    if (data.success) {
      document.getElementById('ultimo-diagnostico').textContent =
        `Fecha: ${data.fecha}, Temperatura: ${data.temperatura} °C`;
    } else {
      document.getElementById('ultimo-diagnostico').textContent = "Sin diagnósticos previos.";
    }
  }

  document.getElementById('nuevo-diagnostico-form').onsubmit = async function(e) {
    e.preventDefault();
    if (!dniPaciente) return;
    const temp = document.getElementById('temperatura').value;
    const resp = await fetch('registrar_diagnostico.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: `dni_paciente=${encodeURIComponent(dniPaciente)}&temperatura=${encodeURIComponent(temp)}`
    });
    const data = await resp.json();
    let msg = document.getElementById('diagnostico-msg');
    if (data.success) {
      msg.textContent = "Diagnóstico guardado correctamente.";
      cargarUltimoDiagnostico();
      document.getElementById('nuevo-diagnostico-form').reset();
    } else {
      msg.textContent = "Error: " + data.msg;
    }
  };
  </script>
</body>
</html>
